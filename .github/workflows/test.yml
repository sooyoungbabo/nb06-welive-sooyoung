name: Test

on:
  push:
    branches:
      - dev # 특정 브랜치에 푸시될 때 실행
  pull_request:
    branches:
      - main # 특정 브랜치로 향하는 Pull Request가 생성/업데이트될 때 실행

jobs:
  test:
    runs-on: ubuntu-latest

    # PostgreSQL 서비스를 Docker 컨테이너로 함께 실행
    services:
      postgres:
        image: postgres:17 # PostgreSQL 버전
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: welive
        ports:
          - 5432:5432 # 로컬에서 5432 포트를 통해 접근 가능
        options: >- # DB가 준비될 때까지 기다리는 설정 (헬스 체크)
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # 전체 테스트 환경에서 사용할 공통 환경변수
    env:
      # PostgreSQL 연결 정보 (Prisma가 이 값을 사용하여 DB 접속)
      DATABASE_URL: postgres://postgres:password@localhost:5432/welive

      # API 기본 주소 및 포트 (예: supertest 등에서 사용)
      BASE_URL: http://localhost:4000
      PORT: 4000
      NODE_ENV: test

      # JWT 서명을 위한 시크릿 키 (테스트용 더미 값)
      JWT_ACCESS_TOKEN_SECRET: your-secret-key
      JWT_REFRESH_TOKEN_SECRET: your-refresh-secret-key

      # AWS 관련 설정 - 실제 AWS 리소스를 사용하는 경우에는 Secrets로 값 주입 필요
      AWS_REGION: ap-northeast-2
      AWS_ACCESS_KEY_ID: aws-access-key # 실제 키를 넣으면 안 됨 (테스트용 더미 값)
      AWS_SECRET_ACCESS_KEY: aws-secret-access-key # 실제 키를 넣으면 안 됨
      AWS_BUCKET_NAME: welive-apartment

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.13.0' # 또는 프로젝트에 필요한 Node.js 버전
          cache: 'npm' # install 속도가 빨라진다고 함

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Wait for DB
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 && break
            sleep 2
          done

      - name: Type Check
        run: npm run typecheck

      - name: Run Unit Test
        run: npm run test:unit

      - name: Run Integration & API Tests
        run: |
          npm run test:integration
          npm run test:api
